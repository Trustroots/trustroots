services:
  mongo-test:
    image: mongo:4.4
    tmpfs:
      - /data/db
    healthcheck:
      test:
        [
          'CMD',
          'mongo',
          '--quiet',
          '--eval',
          'db.runCommand({ ping: 1 }).ok',
        ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  test-runner:
    image: ${TRUSTROOTS_TEST_IMAGE:-trustroots-test:local}
    build:
      context: ../../
      dockerfile: deploy/docker/test.Dockerfile
    depends_on:
      mongo-test:
        condition: service_healthy
    environment:
      - NODE_ENV=test
      - DB_1_PORT_27017_TCP_ADDR=mongo-test
      - TRUSTROOTS_SKIP_LOCAL_CONFIG=true
      - TRUSTROOTS_AVATAR_PROCESSOR_FALLBACK=true
      - TRUSTROOTS_FILE_MAGIC_FALLBACK=true
      - TRUSTROOTS_E2E_MONGO_URI=mongodb://mongo-test:27017/trustroots-test
      - TRUSTROOTS_CODEX_MONGO_URI=mongodb://mongo-test:27017/trustroots-test
      - CI=true
    volumes:
      - ../../:/home/app/trustroots
      - test_node_modules:/home/app/trustroots/node_modules
    working_dir: /home/app/trustroots
    shm_size: '2gb'
    init: true

volumes:
  test_node_modules:
