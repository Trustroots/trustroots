services:
  mongodb:
    image: mongo:4.4
    volumes:
      - ./data/mongodb:/data/db
    restart: unless-stopped

  # Optional localhost port forward for imports/debugging.
  # Enable with: docker compose --profile mongo-localhost up -d mongodb mongodb-localhost
  mongodb-localhost:
    image: alpine/socat
    command:
      - "tcp-listen:27017,fork,reuseaddr,bind=0.0.0.0"
      - "tcp-connect:mongodb:27017"
    depends_on:
      - mongodb
    ports:
      - '127.0.0.1:27017:27017'
    restart: unless-stopped
    profiles:
      - mongo-localhost

  # Default local development service: bind-mounts the repo and runs the app
  # with hot reload (webpack-dev-server on :3000, API on :3001 internally).
  # Started by a plain `docker compose up`.
  dev:
    build:
      context: ../../
      dockerfile: deploy/docker/dev.Dockerfile
    volumes:
      # Mount the repo so edits are picked up live.
      - ../../:/home/app/trustroots
      # Named volume keeps the image's linux-correct node_modules, shadowing
      # whatever is on the host. Seeded from the image on first creation.
      - node_modules:/home/app/trustroots/node_modules
      # Shared local config; points the db at the `mongodb` service and uses
      # the `trustroots` database (same as the import scripts).
      - ./data/local.js:/home/app/trustroots/config/env/local.js
    environment:
      - NODE_ENV=development
      - DB_1_PORT_27017_TCP_ADDR=mongodb
    depends_on:
      - mongodb
      - maildev
    ports:
      - '3000:3000'
    command: ['npm', 'run', 'start:docker']

  # Production-like image, for occasionally testing the built image locally.
  # Gated behind the `prod` profile so plain `docker compose up` skips it:
  #   docker compose --profile prod up --build
  webapp:
    image: trustrootsops/trustroots:latest
    restart: unless-stopped
    profiles:
      - prod
    build:
      context: ../../
      dockerfile: production.Dockerfile
    volumes:
      - ./data/local.js:/home/app/trustroots/config/env/local.js
      - ./data/uploads-profile:/home/app/trustroots/public/uploads-profile
    depends_on:
      - mongodb
    ports:
      - '8080:80'

  worker:
    image: trustrootsops/trustroots:latest
    restart: unless-stopped
    profiles:
      - prod
    build:
      context: ../../
      dockerfile: production.Dockerfile
    volumes:
      - ./data/local.js:/home/app/trustroots/config/env/local.js
      - ./data/uploads-profile:/home/app/trustroots/public/uploads-profile
    depends_on:
      - mongodb
    # The worker needs NODE_ENV set to production because it doesn't use
    # passenger to run the worker
    environment:
      - NODE_ENV=production
    # Override the container's start command (which will start passenger) to
    # start the worker
    command: ["node", "worker.js"]

  influxdb:
    image: influxdb:1.8.10
    ports:
      - '8086:8086'
    volumes:
      - ./data/influxdb:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=db0
      - INFLUXDB_ADMIN_USER=${INFLUXDB_USERNAME}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_PASSWORD}
    profiles:
      - stats

  grafana:
    image: grafana/grafana:latest
    ports:
      - '4000:4000'
    volumes:
      - ./data/grafana.ini:/etc/grafana/grafana.ini
      - ./data/grafana:/var/lib/grafana
      # - ./grafana-provisioning/:/etc/grafana/provisioning
    depends_on:
      - influxdb
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    profiles:
      - stats

  maildev:
    image: soulteary/maildev
    ports:
      - '1080:1080'

volumes:
  # Holds the dev service's node_modules, seeded from the dev image build so it
  # stays independent of the host's (possibly non-linux) node_modules.
  node_modules:
