<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% seo %}
    <meta name="theme-color" content="#004b3f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | default: '' | relative_url }}"
    />
    <script
      defer
      src="https://1p.trustroots.org/script.js"
      data-website-id="8c48b588-60a4-42d8-913a-462826c523fb"
    ></script>
  </head>
  <body>
    <a id="skip-to-content" href="#content">Skip to the content.</a>

    <header class="header" role="banner">
      <div class="header-inner">
        <a
          href="{{ '/' | relative_url }}"
          class="brand"
          aria-label="Team Trustroots home"
        >
          <span class="brand-icon" aria-hidden="true">TR</span>
          <span>
            <span class="brand-name">Team Trustroots</span>
            <span class="brand-url">team.trustroots.org</span>
          </span>
        </a>
        <nav class="hub-nav" aria-label="Site links">
          <a href="https://www.trustroots.org/">Trustroots.org</a>
          <span class="sep" aria-hidden="true">/</span>
          <a href="https://nos.trustroots.org/">Nostroots</a>
          <span class="sep" aria-hidden="true">/</span>
          <a href="https://www.trustroots.org/support">Support</a>
          <span class="sep" aria-hidden="true">/</span>
          <a href="https://github.com/Trustroots/trustroots">GitHub</a>
        </nav>
      </div>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        <div class="footer-links">
          <span class="footer-links-left">
            <a href="https://www.trustroots.org/">Trustroots.org</a>
            <a href="https://nos.trustroots.org/">Nostroots</a>
            <a href="https://www.trustroots.org/support">Support</a>
            <a href="https://github.com/Trustroots/trustroots">GitHub</a>
          </span>
          <a
            class="footer-edit"
            href="{{ site.github.repository_url }}/edit/main/docs{{ page.dir }}{{ page.name }}"
            >Edit this page</a
          >
        </div>
      </footer>
    </main>

    <div class="mycelium" aria-hidden="true">
      <img
        src="{{ '/assets/images/mycelium-roots.svg' | relative_url }}"
        alt=""
      />
    </div>
  </body>
</html>
