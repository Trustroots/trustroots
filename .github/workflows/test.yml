name: Tests

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/test.Dockerfile
          tags: trustroots-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Test client with coverage
        env:
          TRUSTROOTS_TEST_IMAGE: trustroots-test:ci
          TRUSTROOTS_TEST_SKIP_BUILD: 1
        run: ./scripts/docker/test-client.sh
      - name: Upload client coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-client
          path: coverage/client

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/test.Dockerfile
          tags: trustroots-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Test server with coverage
        env:
          TRUSTROOTS_TEST_IMAGE: trustroots-test:ci
          TRUSTROOTS_TEST_SKIP_BUILD: 1
        run: ./scripts/docker/test-server.sh
      - name: Upload server coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-server
          path: coverage/server

  e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/test.Dockerfile
          tags: trustroots-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Test end-to-end smoke suite
        env:
          TRUSTROOTS_TEST_IMAGE: trustroots-test:ci
          TRUSTROOTS_TEST_SKIP_BUILD: 1
        run: ./scripts/docker/test-e2e.sh
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results

  coverage-report:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    needs: [client, server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download client coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-client
          path: coverage/client
      - name: Download server coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-server
          path: coverage/server
      - name: Generate coverage report page
        run: npm run coverage:report
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload coverage report page
        uses: actions/upload-pages-artifact@v4
        with:
          path: coverage-report
      - name: Deploy coverage report page
        id: deployment
        uses: actions/deploy-pages@v4
