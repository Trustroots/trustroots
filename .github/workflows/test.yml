name: Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_client:
        description: Run client tests
        type: boolean
        default: true
      run_server:
        description: Run server tests
        type: boolean
        default: true
      run_e2e:
        description: Run e2e tests
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build-dev-image:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.image.outputs.image-ref }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Set image reference
        id: image
        run: |
          image_ref="ghcr.io/${GITHUB_REPOSITORY,,}/trustroots-dev:${GITHUB_SHA}"
          echo "image-ref=$image_ref" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/dev.Dockerfile
          tags: ${{ steps.image.outputs.image-ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true

  client:
    needs: build-dev-image
    if: >
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.run_client) &&
      (needs.build-dev-image.result == 'success' || needs.build-dev-image.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        if: needs.build-dev-image.result == 'skipped'
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: needs.build-dev-image.result == 'success'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull dev image
        if: needs.build-dev-image.result == 'success'
        run: |
          docker pull "${{ needs.build-dev-image.outputs.image-ref }}"
          docker tag "${{ needs.build-dev-image.outputs.image-ref }}" trustroots-dev:ci
      - name: Build dev image
        if: needs.build-dev-image.result == 'skipped'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/dev.Dockerfile
          tags: trustroots-dev:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Prepare compose local config
        run: node ./scripts/ci/ensure-compose-local.js
      - name: Test client with coverage
        working-directory: deploy/docker
        run: |
          started_at="$(date +%s%3N)"
          exit_code=0
          set +e
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm --no-deps \
            -e CI=true \
            -e NODE_ENV=test \
            -e TRUSTROOTS_SKIP_LOCAL_CONFIG=true \
            dev npm run test:coverage:client
          exit_code="$?"
          if [ "$exit_code" -eq 0 ]; then
            docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm --no-deps \
              -e CI=true \
              -e NODE_ENV=test \
              dev npm run coverage:check -- --scope=client
            exit_code="$?"
          fi
          set -e
          finished_at="$(date +%s%3N)"
          duration_ms="$((finished_at - started_at))"
          status="passed"
          message="Client coverage completed successfully."
          if [ "$exit_code" -ne 0 ]; then
            status="failed"
            message="Client coverage failed."
          fi
          mkdir -p ../../coverage/client
          STATUS="$status" EXIT_CODE="$exit_code" DURATION_MS="$duration_ms" MESSAGE="$message" \
          COMMAND="npm run test:coverage:client && npm run coverage:check -- --scope=client" \
          node - <<'NODE'
          const fs = require('fs');
          const status = {
            status: process.env.STATUS,
            exitCode: Number(process.env.EXIT_CODE),
            message: process.env.MESSAGE,
            generatedAt: new Date().toISOString(),
            command: process.env.COMMAND,
            durationMs: Number(process.env.DURATION_MS),
          };
          fs.writeFileSync('../../coverage/client/coverage-status.json', `${JSON.stringify(status, null, 2)}\n`);
          NODE
          exit "$exit_code"
      - name: Upload client coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-client
          path: coverage/client
          if-no-files-found: ignore

  server:
    needs: build-dev-image
    if: >
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.run_server) &&
      (needs.build-dev-image.result == 'success' || needs.build-dev-image.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        if: needs.build-dev-image.result == 'skipped'
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: needs.build-dev-image.result == 'success'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull dev image
        if: needs.build-dev-image.result == 'success'
        run: |
          docker pull "${{ needs.build-dev-image.outputs.image-ref }}"
          docker tag "${{ needs.build-dev-image.outputs.image-ref }}" trustroots-dev:ci
      - name: Build dev image
        if: needs.build-dev-image.result == 'skipped'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/dev.Dockerfile
          tags: trustroots-dev:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Prepare compose local config
        run: node ./scripts/ci/ensure-compose-local.js
      - name: Start MongoDB
        working-directory: deploy/docker
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d mongodb
      - name: Test server with coverage
        working-directory: deploy/docker
        run: |
          started_at="$(date +%s%3N)"
          exit_code=0
          set +e
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm \
            -e CI=true \
            -e NODE_ENV=test \
            -e DB_1_PORT_27017_TCP_ADDR=mongodb \
            -e TRUSTROOTS_SKIP_LOCAL_CONFIG=true \
            -e TRUSTROOTS_AVATAR_PROCESSOR_FALLBACK=true \
            -e TRUSTROOTS_FILE_MAGIC_FALLBACK=true \
            dev npm run test:coverage:server
          exit_code="$?"
          if [ "$exit_code" -eq 0 ]; then
            docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm \
              -e CI=true \
              -e NODE_ENV=test \
              dev npm run coverage:check -- --scope=server
            exit_code="$?"
          fi
          set -e
          finished_at="$(date +%s%3N)"
          duration_ms="$((finished_at - started_at))"
          status="passed"
          message="Server coverage completed successfully."
          if [ "$exit_code" -ne 0 ]; then
            status="failed"
            message="Server coverage failed."
          fi
          mkdir -p ../../coverage/server
          STATUS="$status" EXIT_CODE="$exit_code" DURATION_MS="$duration_ms" MESSAGE="$message" \
          COMMAND="npm run test:coverage:server && npm run coverage:check -- --scope=server" \
          node - <<'NODE'
          const fs = require('fs');
          const status = {
            status: process.env.STATUS,
            exitCode: Number(process.env.EXIT_CODE),
            message: process.env.MESSAGE,
            generatedAt: new Date().toISOString(),
            command: process.env.COMMAND,
            durationMs: Number(process.env.DURATION_MS),
          };
          fs.writeFileSync('../../coverage/server/coverage-status.json', `${JSON.stringify(status, null, 2)}\n`);
          NODE
          exit "$exit_code"
      - name: Upload server coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-server
          path: coverage/server
          if-no-files-found: ignore

  e2e:
    needs: build-dev-image
    if: >
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.run_e2e) ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'pull_request'
      ) &&
      (needs.build-dev-image.result == 'success' || needs.build-dev-image.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        if: needs.build-dev-image.result == 'skipped'
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: needs.build-dev-image.result == 'success'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull dev image
        if: needs.build-dev-image.result == 'success'
        run: |
          docker pull "${{ needs.build-dev-image.outputs.image-ref }}"
          docker tag "${{ needs.build-dev-image.outputs.image-ref }}" trustroots-dev:ci
      - name: Build dev image
        if: needs.build-dev-image.result == 'skipped'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/dev.Dockerfile
          tags: trustroots-dev:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Prepare compose local config
        run: node ./scripts/ci/ensure-compose-local.js
      - name: Start MongoDB
        working-directory: deploy/docker
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d mongodb
      - name: Test end-to-end smoke suite
        working-directory: deploy/docker
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm \
            -e CI=true \
            -e NODE_ENV=test \
            -e DB_1_PORT_27017_TCP_ADDR=mongodb \
            -e TRUSTROOTS_SKIP_LOCAL_CONFIG=true \
            -e TRUSTROOTS_AVATAR_PROCESSOR_FALLBACK=true \
            -e TRUSTROOTS_FILE_MAGIC_FALLBACK=true \
            -e TRUSTROOTS_E2E_MONGO_URI=mongodb://mongodb:27017/trustroots-test \
            -e TRUSTROOTS_E2E_WORKERS=2 \
            -e TRUSTROOTS_E2E_SERIAL_PROJECTS=true \
            -e TRUSTROOTS_E2E_SKIP_JS_COVERAGE=true \
            dev npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
      - name: Upload e2e coverage status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-e2e
          path: coverage/e2e
          if-no-files-found: ignore
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

  coverage-summary:
    if: always() && github.event_name == 'pull_request'
    needs: [client, server, e2e]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Download client coverage
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: coverage-client
          path: coverage/client
      - name: Download server coverage
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: coverage-server
          path: coverage/server
      - name: Download end-to-end status
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: coverage-e2e
          path: coverage/e2e
      - name: Download Playwright report
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: playwright-report
          path: playwright-report
      - name: Record skipped end-to-end status
        if: needs.e2e.result == 'skipped'
        run: |
          mkdir -p coverage/e2e
          node -e "const fs = require('fs'); const status = { status: 'skipped', exitCode: 0, message: 'End-to-end tests were not requested for this pull request run.', generatedAt: new Date().toISOString(), command: 'npm run test:e2e', reportPath: 'playwright-report/index.html', metrics: null }; fs.writeFileSync('coverage/e2e/status.json', JSON.stringify(status, null, 2) + '\n');"
      - name: Generate coverage overview
        run: npm run coverage:report
      - name: Generate pull request summary
        run: |
          npm run coverage:pr-summary > coverage-report/pr-summary.md
          cat coverage-report/pr-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage overview
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report
      - name: Update pull request coverage comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- trustroots-coverage-report -->';
            const body = fs.readFileSync('coverage-report/pr-summary.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    # Serialize all GitHub Pages deployments (across runs and the two deploy
    # jobs below) so actions/deploy-pages does not fail with "Deployment
    # failed, try again later." when deployments to this environment overlap.
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: https://team.trustroots.org/
    steps:
      - uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Build docs site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Restore previous coverage report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp -r _site site
          mkdir -p site/coverage
          artifact_id=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=coverage-report&per_page=100" \
            --jq 'first(.artifacts[] | select(.expired == false)).id // empty' || true)
          if [ -n "$artifact_id" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
              > coverage-report.zip || true
            unzip -q -o coverage-report.zip -d site/coverage || true
          fi
          if [ ! -s site/coverage/index.html ]; then
            cat > site/coverage/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Trustroots Coverage Report</title>
            <p>No coverage report is available yet.</p>
            <p>
              The report is generated by GitHub Actions after tests pass on the
              main branch, and the previous report is restored from build
              artifacts. If this message persists, there may not have been a
              successful run in the last 90 days (artifacts expire after that).
            </p>
            <p><a href="/">Team home</a></p>
          </html>
          HTML
          fi
      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-docs-${{ github.run_id }}-${{ github.run_attempt }}
          path: site
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-docs-${{ github.run_id }}-${{ github.run_attempt }}

  pages-coverage:
    if: >
      always() &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      needs.client.result == 'success' &&
      needs.server.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'failure')
    needs: [client, server, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: https://team.trustroots.org/
    steps:
      - uses: actions/checkout@v6
      - name: Download client coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-client
          path: coverage/client
      - name: Download server coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-server
          path: coverage/server
      - name: Download e2e coverage status
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: coverage-e2e
          path: coverage/e2e
      - name: Download Playwright report
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: playwright-report
          path: playwright-report
      - name: Generate coverage report page
        run: npm run coverage:report
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Build docs site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Add coverage report to site
        run: |
          cp -r _site site
          mkdir -p site/coverage
          cp -r coverage-report/. site/coverage/
      - name: Upload site with coverage
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: site
      - name: Deploy site with coverage
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report
