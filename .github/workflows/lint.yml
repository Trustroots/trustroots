name: Linter

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    # Don't run inline ESlint test if PR is from a forked repo (i.e. it doesn't have read permission)
    # See https://github.com/ataylorme/eslint-annotate-action/issues/28
    if: github.event.pull_request.head.repo.full_name == github.repository

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 16
          cache: npm
      - name: Pin npm to v7
        run: npm i -g npm@7
      - name: Reconfigure git to use HTTP authentication
        run: >
          git config --global url."https://github.com/".insteadOf
          ssh://git@github.com/
      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci --ignore-scripts --prefer-offline --no-audit \
              --fetch-retries=5 \
              --fetch-retry-mintimeout=20000 \
              --fetch-retry-maxtimeout=120000 \
              --fetch-timeout=600000 && break

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep 30
          done
      - name: Lint
        # See https://eslint.org/docs/user-guide/command-line-interface#options
        run: npm run lint:report
        # Continue to the next step even if this fails
        continue-on-error: true
      - name: Run ESLint with reviewdog
        uses: reviewdog/action-eslint@v1.34.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-check
          filter_mode: file # annotate all issues in changed files (mirrors old only-pr-files)
          fail_level: error # fail the check on ESLint errors (warnings still reported)
          eslint_flags: '.'
      - name: Upload ESLint report
        uses: actions/upload-artifact@v7
        with:
          name: eslint_report.json
          path: eslint_report.json
